<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>成绩管理 - 成绩管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background-color: #f5f7fa; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background-color: #2c3e50;
            color: #ecf0f1;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li a {
            display: block;
            padding: 12px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: background 0.3s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background-color: #1abc9c;
            color: white;
        }
        .main-content {
            flex: 1;
            padding: 20px 30px;
            background-color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th { background-color: #f2f2f2; }
        .btn {
            padding: 4px 10px;
            text-decoration: none;
            border-radius: 4px;
            margin: 0 2px;
            display: inline-block;
            font-size: 13px;
        }
        .btn-danger { background-color: #d9534f; color: white; }
        .btn-danger:hover { background-color: #c9302c; }
        .btn-primary { background-color: #337ab7; color: white; }
        .btn-primary:hover { background-color: #286090; }
        .btn-success { background-color: #46acac; color: white; }
        .btn-success:hover { background-color: #368a8a; }
        .search-box {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-box input {
            width: 300px;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .search-box .btn {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
        }
        h2 { margin-bottom: 10px; color: #2c3e50; }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">📚 学生成绩管理系统</div>
        <ul class="sidebar-menu">
            <li><a href="/students/list">👨‍🎓 学生管理</a></li>
            <li><a href="/courses/list">📖 课程管理</a></li>
            <li><a href="/scores/list" class="active">📊 成绩管理</a></li>
            <li style="margin-top: 40px;"><a href="/logout">🚪 退出登录</a></li>
        </ul>
    </div>
    <div class="main-content">
        <h2>学生成绩列表</h2>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <div class="search-box">
            <form method="get" action="/scores/list" style="display: flex; gap: 10px;">
                <input type="text" name="keyword" placeholder="输入学生姓名/学号或课程名称" th:value="${keyword}" />
                <button type="submit" class="btn btn-primary">查询</button>
            </form>
            <a href="/scores/add" class="btn btn-primary">录入成绩</a>
        </div>

        <table>
            <thead>
            <tr><th>ID</th><th>学号</th><th>学生姓名</th><th>课程编号</th><th>课程名称</th><th>成绩</th><th>操作</th></tr>
            </thead>
            <tbody>
            <tr th:each="s : ${scores}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.studentNo}"></td>
                <td th:text="${s.studentName}"></td>
                <td th:text="${s.courseNo}"></td>
                <td th:text="${s.courseName}"></td>
                <td th:text="${s.score}"></td>
                <td>
                    <a th:href="@{/scores/edit/{id}(id=${s.id})}" class="btn btn-primary">编辑</a>
                    <a th:href="@{/scores/delete/{id}(id=${s.id})}" class="btn btn-danger" onclick="return confirm('确定删除该成绩吗？')">删除</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
