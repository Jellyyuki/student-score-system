<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${student.id == null} ? '添加学生' : '编辑学生'">学生表单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
        }
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        /* 侧边栏样式（与列表页一致） */
        .sidebar {
            width: 220px;
            background-color: #2c3e50;
            color: #ecf0f1;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
        }
        .sidebar-menu li a {
            display: block;
            padding: 12px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: background 0.3s;
        }
        .sidebar-menu li a:hover {
            background-color: #1abc9c;
            color: #fff;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background-color: #1abc9c;
            color: white;
        }
        .main-content {
            flex: 1;
            padding: 30px;
            background-color: #fff;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: #f9f9f9;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .form-group label {
            width: 100px;
            font-weight: bold;
            color: #333;
        }
        .form-group input, .form-group select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-actions {
            margin-top: 30px;
            text-align: center;
        }
        button {
            padding: 8px 20px;
            background-color: #337ab7;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background-color: #286090;
        }
        .back-link {
            margin-left: 15px;
            text-decoration: none;
            color: #337ab7;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 侧边栏（与列表页相同，高亮学生管理） -->
    <div class="sidebar">
        <div class="sidebar-header">📚 学生成绩管理系统</div>
        <ul class="sidebar-menu">
            <li><a href="/students/list">👨‍🎓 学生管理</a></li>
            <li><a href="/courses/list">📖 课程管理</a></li>
            <li><a href="/scores/list">📊 成绩管理</a></li>
            <li><a href="/teachers/list">👨‍🏫 教师管理</a></li>
            <li><a href="/classes/list">🏫 班级管理</a></li>
            <li style="margin-top: 40px;"><a href="/logout">🚪 退出登录</a></li>
        </ul>
    </div>

    <!-- 右侧表单内容 -->
    <div class="main-content">
        <div class="form-container">
            <h2 th:text="${student.id == null} ? '添加学生' : '编辑学生'"></h2>
            <form th:action="@{/students/save}" th:object="${student}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="form-group">
                    <label>学号：</label>
                    <input type="text" th:field="*{studentNo}" required />
                </div>
                <div class="form-group">
                    <label>姓名：</label>
                    <input type="text" th:field="*{name}" required />
                </div>
                <div class="form-group">
                    <label>性别：</label>
                    <select th:field="*{gender}">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>出生日期：</label>
                    <input type="date" th:field="*{birthDate}" required />
                </div>
                <div class="form-group">
                    <label>班级：</label>
                    <input type="text" th:field="*{className}" required />
                </div>
                <div class="form-actions">
                    <button type="submit">保存</button>
                    <a href="/students/list" class="back-link">返回列表</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
