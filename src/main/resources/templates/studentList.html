<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生信息列表 - 成绩管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background-color: #f5f7fa;
        }
        /* 整体布局 flex */
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        /* 侧边栏样式 */
        .sidebar {
            width: 220px;
            background-color: #2c3e50;
            color: #ecf0f1;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
        }
        .sidebar-menu li {
            margin: 0;
        }
        .sidebar-menu li a {
            display: block;
            padding: 12px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: background 0.3s;
        }
        .sidebar-menu li a:hover {
            background-color: #1abc9c;
            color: #fff;
        }
        .sidebar-menu li a.active {
            background-color: #1abc9c;
            color: white;
        }
        /* 右侧主内容区 */
        .main-content {
            flex: 1;
            padding: 20px 30px;
            background-color: #fff;
        }
        /* 表格样式（沿用原有并微调） */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        /* 大按钮 */
        .btn {
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 6px;
            margin: 0 2px;
            display: inline-block;
            font-size: 16px;
            text-align: center;
            line-height: 1.4;
            border: none;
            outline: none;
            box-shadow: none;
            cursor: pointer;
        }

        /* 小按钮 */
        .btn-sm {
            padding: 3px 8px;    /* 缩小内边距 */
            font-size: 12px;     /* 缩小文字 */
            border-radius: 3px;  /* 小圆角更好看 */
        }

        .btn-primary {
            background-color: #337ab7;
            color: white;
        }
        .btn-primary:hover {
            background-color: #286090;
        }

        .btn-danger {
            background-color: #d9534f;
            color: white;
        }
        .btn-danger:hover {
            background-color: #c9302c;
        }

        .search-box {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-box input {
            width: 300px;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .search-box .btn {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
        }
        h2 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">📚学生成绩管理系统</div>
        <ul class="sidebar-menu">
            <li><a href="/students/list" class="active">👨‍🎓 学生管理</a></li>
            <li><a href="/courses/list">📖 课程管理</a></li>
            <li><a href="/scores/list">📊 成绩管理</a></li>
            <!-- 后续可扩展其他菜单 -->
        </ul>
    </div>

    <!-- 右侧内容区 -->
    <div class="main-content">
        <h2>学生信息列表</h2>
        <div class="search-box">
            <form method="get" action="/students/list" style="display: flex; gap: 10px;">
                <input type="text" name="keyword" placeholder="输入姓名或学号" th:value="${keyword}" />
                <button type="submit" class="btn btn-primary">查询</button>
            </form>
            <a href="/students/add" class="btn btn-primary" style="margin-left: 10px;">添加学生</a>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th><th>学号</th><th>姓名</th><th>性别</th><th>出生日期</th><th>班级</th><th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="stu : ${students}">
                <td th:text="${stu.id}"></td>
                <td th:text="${stu.studentNo}"></td>
                <td th:text="${stu.name}"></td>
                <td th:text="${stu.gender}"></td>
                <td th:text="${#temporals.format(stu.birthDate, 'yyyy-MM-dd')}"></td>
                <td th:text="${stu.className}"></td>
                <td>
                    <a th:href="@{/students/edit/{id}(id=${stu.id})}" class="btn btn-sm btn-primary">编辑</a>
                    <a th:href="@{/students/delete/{id}(id=${stu.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
