<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>班级管理 - 成绩管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, "Microsoft YaHei", sans-serif; background-color: #f5f7fa; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background-color: #2c3e50;
            color: #ecf0f1;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
        }
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li a {
            display: block;
            padding: 12px 20px;
            color: #ecf0f1;
            text-decoration: none;
            transition: background 0.3s;
        }
        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background-color: #1abc9c;
            color: white;
        }
        .main-content {
            flex: 1;
            padding: 20px 30px;
            background-color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th { background-color: #f2f2f2; }
        .btn {
            padding: 4px 10px;
            text-decoration: none;
            border-radius: 4px;
            margin: 0 2px;
            display: inline-block;
            font-size: 13px;
            cursor: pointer;
            border: none;
        }
        .btn-danger { background-color: #d9534f; color: white; }
        .btn-danger:hover { background-color: #c9302c; }
        .btn-primary { background-color: #337ab7; color: white; }
        .btn-primary:hover { background-color: #286090; }
        .btn-success { background-color: #5cb85c; color: white; }
        .btn-success:hover { background-color: #4cae4c; }
        .search-box {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .search-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-box input {
            width: 250px;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .search-box .btn {
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 4px;
        }
        h2 { margin-bottom: 10px; color: #2c3e50; }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .badge {
            background-color: #1abc9c;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">📚 学生成绩管理系统</div>
        <ul class="sidebar-menu">
            <li><a href="/students/list">👨‍🎓 学生管理</a></li>
            <li><a href="/courses/list">📖 课程管理</a></li>
            <li><a href="/scores/list">📊 成绩管理</a></li>
            <li><a href="/teachers/list">👨‍🏫 教师管理</a></li>
            <li><a href="/classes/list" class="active">🏫 班级管理</a></li>
            <li style="margin-top: 40px;"><a href="/logout">🚪 退出登录</a></li>
        </ul>
    </div>
    <div class="main-content">
        <h2>班级信息列表</h2>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <div class="search-box">
            <div class="search-left">
                <form method="get" action="/classes/list" style="display: flex; gap: 10px;">
                    <input type="text" name="keyword" placeholder="班级名称/编号" th:value="${keyword}" />
                    <button type="submit" class="btn btn-primary">查询</button>
                    <a href="/classes/list" class="btn btn-primary">重置</a>
                </form>
            </div>
            <a href="/classes/add" class="btn btn-success">添加班级</a>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>班级编号</th>
                <th>班级名称</th>
                <th>年级</th>
                <th>专业</th>
                <th>班主任</th>
                <th>学生人数</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${classes}">
                <td th:text="${c.id}">?</td>
                <td th:text="${c.classNo}">?</td>
                <td th:text="${c.className}">?</td>
                <td th:text="${c.grade}">?</td>
                <td th:text="${c.major}">?</td>
                <td th:text="${c.headteacherName}">?</td>
                <td><span class="badge" th:text="${c.studentCount} + '人'">0人</span></td>
                <td>
                    <a th:href="@{/classes/edit/{id}(id=${c.id})}" class="btn btn-primary">编辑</a>
                    <a th:href="@{/classes/delete/{id}(id=${c.id})}" class="btn btn-danger" onclick="return confirm('确定删除该班级吗？')">删除</a>
                </td>
            </tr>
            <tr th:if="${classes.empty}">
                <td colspan="8" style="text-align: center; color: #999;">暂无班级数据，请点击"添加班级"</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
